name: Release
on:
  push:
    branches:
      - main
      - renovate/**
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: version
        name: Get version
        shell: pwsh
        run: '"version=$(scripts/Get-Version.ps1 -RefName $env:GITHUB_REF)" >> $env:GITHUB_OUTPUT'

      - name: Read the changelog
        uses: ForNeVeR/ChangelogAutomation.action@v2
        with:
          input: ./CHANGELOG.md
          output: ./changelog-section.md

      - name: Cache downloaded JDK
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}.jvm.${{ hashFiles('gradlew*') }}
          path: |-
            ~/.local/share/gradle-jvm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build the plugin
        run: ./gradlew buildPlugin

      - name: Upload the artifact
        uses: actions/upload-artifact@v7
        with:
          name: file-link-executor-${{ steps.version.outputs.version }}.zip
          path: build/distributions/file-link-executor-${{ steps.version.outputs.version }}.zip

      - name: Upload the changelog
        uses: actions/upload-artifact@v7
        with:
          name: changelog-section.md
          path: ./changelog-section.md

      - name: Create a release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: file-link-executor v${{ steps.version.outputs.version }}
          body_path: ./changelog-section.md
          files: |
            build/distributions/file-link-executor-${{ steps.version.outputs.version }}.zip

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: ./gradlew publishPlugin
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
